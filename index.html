<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Message Meter</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="card">

<h1>Message box</h1>
<p class="subtitle">Maximum 200 characters allowed</p>

<textarea id="message" placeholder="Write your text here..."></textarea>

<div class="textcounts">

<p id="counter">0 / 200 characters</p>
<p id="remaining">200 remaining</p>

</div>

<p id="warning"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
